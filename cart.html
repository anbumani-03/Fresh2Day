<!DOCTYPE html>
<html>

<head>
  <title>Cart</title>
  <link rel="stylesheet" href="css/product.css">
</head>

<body>
  <h1><a href="index.html">Home /</a> Your Cart</h1>
  <div class="container" id="cart"></div>
  <button class="clear-btn" onclick="localStorage.removeItem('cart'); renderCart();">Clear All</button>
  <div>
    <table id="table" class="table" border="1">
      <tr>
        <th>Product name</th>
        <th>weight</th>
        <th>cost</th>
      </tr>
    </table>
  </div>
  <script>
    // Helper to render cart
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const container = document.getElementById('cart');
      container.innerHTML = '';  // Clear existing

      const table = document.getElementById("table");
      table.innerHTML = '';
      let thead = document.createElement("tr");
      thead.innerHTML = `
        <th>No.</th>
        <th>Product name</th>
        <th>weight</th>
        <th>cost</th>
        
      `;
      table.appendChild(thead);

      let total = 0;
      cart.forEach((product, index) => {
        const div = document.createElement('div');
        div.classList.add('card');
        div.innerHTML= `
          <img src="${product.image}" >
          <h3  >${product.name}</h3>
          <select  >
            <option>${product.op1}</option>
            <option>${product.op2}</option>
          </select>
          <div class="price">₹${product.price}</div>
          <button class="add-btn" onclick="removeFromCart(${index})" >×</button>
        `;
        container.appendChild(div);


        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${product.name}</td>
          <td>${product.op1}</td>
          <td>${product.price}</td>
        ` ;
        table.appendChild(tr);
        total += parseFloat(product.price) || 0;
      });
      const totalRow = document.createElement("tr");
      totalRow.innerHTML = `
      <td colspan="3"><strong>Total</strong></td>
      <td><strong>₹${total.toFixed(2)}</strong></td>
    `;
      table.appendChild(totalRow);

      if (cart.length === 0) {
        container.innerHTML = '<p id="empty-cart">Your cart is empty.<br><br><a href="index.html">→Continue Shopping</a></p>';
        clearbtn();
        let print=document.getElementsByClassName("print")[0];
        print.innerHTML='';
      }
    }
    function clearbtn() {
      let button = document.getElementsByTagName("button")[0];
      button.remove();
      table.innerHTML = '';
    }
    // Remove function
    function removeFromCart(index) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    // Load on page load
    window.onload = renderCart;


    // print table
    // function printTable() {
      // apply a special print‑only style class
    //   document.body.classList.add("print-table-only");
    //   window.print();
    //   document.body.classList.remove("print-table-only");
    // }

    // print table
  </script>
</body>

</html>
