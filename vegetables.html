<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetables</title>
    <link href="css/product.css" rel="stylesheet">

</head>

<body>
    <div class="homelink">
        <a href="index.html">HOME</a>
        <a href="">&nbsp / &nbsp FRESH VEGETABLES</a>
    </div>
    <div class="container" id="products">
 
    </div>

</body>
<script>

    // // Product data (add as many as you want)
    const products = [
        { name:"Coriander Leaves", price:9, image: "images/corionder.webp", op1: "1 bunch", op2: "" },
        { name:"Mint Leaves", price:8, image: "images/mint.png", op1: "1 bunch", op2: "" },
        { name:"banana Leaf", price:8, image: "images/banana leaf.jpeg", op1: "1 pcs", op2: "" },
        { name:"Ballari Onion", price:50, image: "images/ballari onion", op1: "50 kg", op2: "" },
        { name:"Palak Keerai", price:19, image: "images/palak keerai.webp", op1: "1 bunch", op2: "" },
        { name:"Siru Keerai", price:19, image: "images/siru keerai.jpg", op1: "1 bunch", op2: "" },
        { name:"Mulai Keerai", price:18, image: "images/mulai keerai.jpeg", op1: "1 bunch", op2: "" },
        { name:"Arai Keerai", price:18, image: "images/arai keerai.jpg", op1: "1 bunch", op2: "" },
        { name:"Coconut", price:88, image: "images/coconut", op1: "1 kg", op2: "" },
        { name:"Cauliflower", price:29, image: "images/cauliflower.jpg", op1: "1 pc", op2: "" },
        { name:"Potato", price:30, image: "images/potato.jpg", op1: "1 kg", op2: "" },
        { name:"Banana Flower", price:58, image: "images/banana flower.jpeg", op1: "2 pc", op2: "" },
        { name:"Beans Cluster", price:95, image: "images/beans", op1: "1 kg", op2: "" },
        { name:"Country Tomato", price:28, image: "images/tomato.jpg", op1: "1 kg", op2: "" },
        { name:" Onion Small", price:59, image: "images/small onion.jpg", op1: "1 kg", op2: "" },
       
    ];

    // // Select container
    const container = document.getElementById("products");

    // // Loop and create cards
    products.forEach((product, index) => {
        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
        <img src="${product.image}">

            <h3>${product.name}</h3>
            <select>
                <option>${product.op1}</option>    
                <option>${product.op2}</option>    
            </select>
            <div class="price">₹${product.price}</div>

            <button class="add-btn" onclick="addToCart(${index})">+</button>
            
        `;
        container.appendChild(div);
    });


    function addToCart(index) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const product = products[index];
        cart.push(product);  // Add full product object
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(`${product.name} added to cart!`);  // Optional feedback
    }

    button.onclick = () => addToCart(index);

</script>

</html>
